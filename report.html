<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Report Issue</title>
</head>
<body>

<h2>Report an Issue</h2>

<form method="POST" class="card p-4 shadow">
    

    <input class="form-control mb-3" type="text" name="title" placeholder="Title">

    <textarea class="form-control mb-3" name="description" placeholder="Description"></textarea>

    <select class="form-control mb-3" name="issue_type">
        <option value="water">Water Leak</option>
        <option value="electricity">Electricity Fault</option>
        <option value="pothole">Pothole</option>
        <option value="waste">Waste</option>
    </select>

    <input class="form-control mb-3" type="text" name="location" placeholder="Location">

    <button class="btn btn-primary">Submit</button>
</form>

</body>
</html>
